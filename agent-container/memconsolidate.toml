# Memory consolidation and extraction daemon for OpenClaw
# https://github.com/tverney/agent-memory-daemon

memory_directory = "/root/.openclaw/workspace"
session_directory = "/root/.openclaw/agents/main/sessions"

# Consolidation settings
min_hours = 24
min_sessions = 5
poll_interval_ms = 60000
max_session_content_chars = 2000
max_memory_content_chars = 4000
max_index_lines = 200
max_index_bytes = 25000
dry_run = false

# Extraction settings
extraction_enabled = true
extraction_interval_ms = 60000
max_extraction_session_chars = 5000

[llm_backend]
name = "bedrock"
region = "us-east-2"
model = "us.anthropic.claude-haiku-4-5-20251001-v1:0"
